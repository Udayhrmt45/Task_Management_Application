<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6ef0"/>
      <stop offset="50%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#5a4bd6"/>
    </linearGradient>
  </defs>
  <!-- Outer filled hexagon -->
  <polygon
    points="50,3 93.3,26.5 93.3,73.5 50,97 6.7,73.5 6.7,26.5"
    fill="url(#hexGrad)"
  />
  <!-- Inner dark hexagon to create the "outlined" look -->
  <polygon
    points="50,14 83,31.5 83,68.5 50,86 17,68.5 17,31.5"
    fill="#151827"
  />
</svg>
